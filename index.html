<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slideshow</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    cursor: none;
  }

  body.controls-visible { cursor: default; }

  #slide {
    width: 100vw;
    height: 100vh;
    object-fit: contain;
    display: block;
    opacity: 1;
    transition: opacity 0.6s ease;
  }

  #slide.fade { opacity: 0; }

  /* Loading state */
  #loading {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    color: #888;
  }

  /* Controls overlay */
  #controls {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.8));
    padding: 2rem 1.5rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    opacity: 0;
    transition: opacity 0.3s ease;
    z-index: 10;
  }

  #controls.visible { opacity: 1; }

  #controls button {
    background: none;
    border: 1px solid rgba(255,255,255,0.4);
    color: #fff;
    width: 2.5rem;
    height: 2.5rem;
    border-radius: 50%;
    font-size: 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  #controls button:hover { background: rgba(255,255,255,0.15); }

  #progress-bar {
    flex: 1;
    height: 3px;
    background: rgba(255,255,255,0.2);
    border-radius: 2px;
    overflow: hidden;
    cursor: pointer;
  }

  #progress-fill {
    height: 100%;
    background: #fff;
    width: 0%;
    transition: width 0.3s ease;
  }

  #counter {
    font-size: 0.85rem;
    color: rgba(255,255,255,0.7);
    white-space: nowrap;
    min-width: 4rem;
    text-align: right;
  }

  /* Settings panel */
  #settings {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(30,30,30,0.95);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    padding: 2rem;
    z-index: 20;
    display: none;
    min-width: 280px;
  }

  #settings.visible { display: block; }

  #settings h2 {
    font-size: 1.1rem;
    margin-bottom: 1.2rem;
    font-weight: 500;
  }

  .setting-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
  }

  .setting-row label {
    font-size: 0.9rem;
    color: rgba(255,255,255,0.8);
  }

  .setting-row input[type="number"] {
    width: 5rem;
    padding: 0.3rem 0.5rem;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 6px;
    color: #fff;
    font-size: 0.9rem;
    text-align: center;
  }

  .setting-row input[type="checkbox"] {
    width: 1.2rem;
    height: 1.2rem;
    cursor: pointer;
  }

  #settings-close {
    margin-top: 1rem;
    width: 100%;
    padding: 0.5rem;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 6px;
    color: #fff;
    font-size: 0.9rem;
    cursor: pointer;
  }

  #settings-close:hover { background: rgba(255,255,255,0.2); }

  /* Folder info */
  #folder-info {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    background: linear-gradient(rgba(0,0,0,0.8), transparent);
    padding: 1rem 1.5rem 2rem;
    font-size: 0.85rem;
    color: rgba(255,255,255,0.6);
    opacity: 0;
    transition: opacity 0.3s ease;
    z-index: 10;
  }

  #folder-info.visible { opacity: 1; }
</style>
</head>
<body>

<div id="loading">Loading slides...</div>
<img id="slide" alt="" style="display:none;">

<div id="folder-info"></div>

<div id="controls">
  <button id="btn-prev" title="Previous (Left arrow)">&#9664;</button>
  <button id="btn-play" title="Play/Pause (Space)">&#9646;&#9646;</button>
  <button id="btn-next" title="Next (Right arrow)">&#9654;</button>
  <div id="progress-bar"><div id="progress-fill"></div></div>
  <span id="counter"></span>
  <button id="btn-settings" title="Settings (S)">&#9881;</button>
</div>

<div id="settings">
  <h2>Settings</h2>
  <div class="setting-row">
    <label for="interval-input">Interval (seconds)</label>
    <input type="number" id="interval-input" min="1" max="60" value="4" step="0.5">
  </div>
  <div class="setting-row">
    <label for="loop-input">Loop</label>
    <input type="checkbox" id="loop-input" checked>
  </div>
  <button id="settings-close">Close</button>
</div>

<script>
(function () {
  'use strict';

  // --- Config ---
  var SLIDES_DIR = 'slides';
  var IMAGE_EXTENSIONS = ['jpg', 'jpeg', 'png', 'gif', 'webp', 'bmp', 'svg'];

  // --- State ---
  var images = [];
  var currentIndex = 0;
  var playing = true;
  var interval = 4;
  var loop = true;
  var timer = null;
  var controlsTimeout = null;

  // --- DOM refs ---
  var slideEl = document.getElementById('slide');
  var loadingEl = document.getElementById('loading');
  var controlsEl = document.getElementById('controls');
  var folderInfoEl = document.getElementById('folder-info');
  var btnPrev = document.getElementById('btn-prev');
  var btnPlay = document.getElementById('btn-play');
  var btnNext = document.getElementById('btn-next');
  var progressFill = document.getElementById('progress-fill');
  var progressBar = document.getElementById('progress-bar');
  var counterEl = document.getElementById('counter');
  var btnSettings = document.getElementById('btn-settings');
  var settingsEl = document.getElementById('settings');
  var intervalInput = document.getElementById('interval-input');
  var loopInput = document.getElementById('loop-input');
  var settingsClose = document.getElementById('settings-close');

  // --- Image discovery ---
  // Fetches a directory listing and parses out links
  function listDirectory(path) {
    var url = path.endsWith('/') ? path : path + '/';
    return fetch(url).then(function (resp) {
      if (!resp.ok) return [];
      return resp.text().then(function (html) {
        var parser = new DOMParser();
        var doc = parser.parseFromString(html, 'text/html');
        var links = Array.from(doc.querySelectorAll('a'));
        return links
          .map(function (a) { return decodeURIComponent(a.getAttribute('href') || ''); })
          .filter(function (href) {
            return href && href !== '../' && !href.startsWith('/') && !href.startsWith('?');
          });
      });
    });
  }

  function isImage(name) {
    var ext = name.split('.').pop().toLowerCase();
    return IMAGE_EXTENSIONS.indexOf(ext) !== -1;
  }

  function discoverImages(dir) {
    return listDirectory(dir).then(function (entries) {
      // Sort entries alphanumerically
      var sorted = entries.slice().sort(function (a, b) {
        return a.localeCompare(b, undefined, { numeric: true, sensitivity: 'base' });
      });

      var results = [];
      var chain = Promise.resolve();

      sorted.forEach(function (entry) {
        var fullPath = dir + '/' + entry.replace(/\/$/, '');
        if (entry.endsWith('/')) {
          chain = chain.then(function () {
            return discoverImages(fullPath).then(function (subImages) {
              results.push.apply(results, subImages);
            });
          });
        } else if (isImage(entry)) {
          results.push(fullPath);
        }
      });

      return chain.then(function () { return results; });
    });
  }

  // --- Slideshow control ---
  function updateUI() {
    counterEl.textContent = images.length > 0
      ? (currentIndex + 1) + ' / ' + images.length
      : '';
    progressFill.style.width = images.length > 0
      ? (((currentIndex + 1) / images.length) * 100) + '%'
      : '0%';
    btnPlay.innerHTML = playing ? '&#9646;&#9646;' : '&#9654;';

    // Show folder path
    if (images.length > 0) {
      var path = images[currentIndex];
      var parts = path.split('/');
      parts.pop();
      folderInfoEl.textContent = parts.join(' / ');
    }
  }

  function showSlide(index) {
    if (images.length === 0) return;
    currentIndex = index;

    // Fade out
    slideEl.classList.add('fade');

    setTimeout(function () {
      slideEl.src = encodeURI(images[currentIndex]);
      slideEl.onload = function () {
        slideEl.style.display = 'block';
        loadingEl.style.display = 'none';
        slideEl.classList.remove('fade');
        updateUI();
      };
      slideEl.onerror = function () {
        // Skip unloadable images
        next();
      };
    }, 300);
  }

  function next() {
    if (images.length === 0) return;
    if (currentIndex < images.length - 1) {
      showSlide(currentIndex + 1);
    } else if (loop) {
      showSlide(0);
    } else {
      pause();
    }
  }

  function prev() {
    if (images.length === 0) return;
    if (currentIndex > 0) {
      showSlide(currentIndex - 1);
    } else if (loop) {
      showSlide(images.length - 1);
    }
  }

  function play() {
    playing = true;
    updateUI();
    scheduleNext();
  }

  function pause() {
    playing = false;
    clearTimeout(timer);
    timer = null;
    updateUI();
  }

  function togglePlay() {
    if (playing) { pause(); } else { play(); }
  }

  function scheduleNext() {
    clearTimeout(timer);
    if (!playing) return;
    timer = setTimeout(function () {
      next();
      if (playing) scheduleNext();
    }, interval * 1000);
  }

  // --- Controls visibility ---
  function showControls() {
    controlsEl.classList.add('visible');
    folderInfoEl.classList.add('visible');
    document.body.classList.add('controls-visible');
    clearTimeout(controlsTimeout);
    controlsTimeout = setTimeout(hideControls, 3000);
  }

  function hideControls() {
    if (settingsEl.classList.contains('visible')) return;
    controlsEl.classList.remove('visible');
    folderInfoEl.classList.remove('visible');
    document.body.classList.remove('controls-visible');
  }

  // --- Settings ---
  function openSettings() {
    pause();
    settingsEl.classList.add('visible');
    showControls();
  }

  function closeSettings() {
    settingsEl.classList.remove('visible');
    interval = parseFloat(intervalInput.value) || 4;
    loop = loopInput.checked;
  }

  // --- Progress bar click ---
  progressBar.addEventListener('click', function (e) {
    var rect = progressBar.getBoundingClientRect();
    var ratio = (e.clientX - rect.left) / rect.width;
    var index = Math.round(ratio * (images.length - 1));
    showSlide(index);
    if (playing) scheduleNext();
  });

  // --- Event listeners ---
  document.addEventListener('mousemove', showControls);
  document.addEventListener('click', function (e) {
    if (settingsEl.classList.contains('visible') &&
        !settingsEl.contains(e.target) &&
        e.target !== btnSettings) {
      closeSettings();
    }
  });

  btnPrev.addEventListener('click', function () { prev(); if (playing) scheduleNext(); });
  btnNext.addEventListener('click', function () { next(); if (playing) scheduleNext(); });
  btnPlay.addEventListener('click', togglePlay);
  btnSettings.addEventListener('click', openSettings);
  settingsClose.addEventListener('click', closeSettings);

  document.addEventListener('keydown', function (e) {
    if (settingsEl.classList.contains('visible')) {
      if (e.key === 'Escape') closeSettings();
      return;
    }

    switch (e.key) {
      case ' ':
        e.preventDefault();
        togglePlay();
        break;
      case 'ArrowLeft':
        prev();
        if (playing) scheduleNext();
        showControls();
        break;
      case 'ArrowRight':
        next();
        if (playing) scheduleNext();
        showControls();
        break;
      case 's':
      case 'S':
        openSettings();
        break;
    }
  });

  // --- Init ---
  function init() {
    discoverImages(SLIDES_DIR).then(function (found) {
      images = found;
      if (images.length === 0) {
        loadingEl.textContent = 'No images found in slides/ folder.';
        return;
      }
      showSlide(0);
      scheduleNext();
      showControls();
    }).catch(function (err) {
      loadingEl.textContent = 'Error loading slides. Make sure you are running a local server.';
      console.error(err);
    });
  }

  init();
})();
</script>
</body>
</html>
